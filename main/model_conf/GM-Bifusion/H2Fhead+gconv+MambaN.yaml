# Ultralytics YOLO11 object detection model with P3/8 - P5/32 outputs
# Model docs: https://docs.ultralytics.com/models/yolo11
# Task docs: https://docs.ultralytics.com/tasks/detect

# Parameters
nc: 80 # number of classes
ch: 3
scales: # model compound scaling constants, i.e. 'model=yolo11n.yaml' will call yolo11.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024] # summary: 319 layers, 2624080 parameters, 2624064 gradients, 6.6 GFLOPs
  s: [0.50, 0.50, 1024] # summary: 319 layers, 9458752 parameters, 9458736 gradients, 21.7 GFLOPs
  m: [0.50, 1.00, 512] # summary: 409 layers, 20114688 parameters, 20114672 gradients, 68.5 GFLOPs
  l: [1.00, 1.00, 512] # summary: 631 layers, 25372160 parameters, 25372144 gradients, 87.6 GFLOPs
  x: [1.00, 1.50, 512] # summary: 631 layers, 56966176 parameters, 56966160 gradients, 196.0 GFLOPs

# YOLO11n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]] # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]] # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]] #2 第一个C2F
  - [-1, 1, Conv, [256, 3, 2]] # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]] # 4 第二个C2F
  - [-1, 1, Conv, [512, 3, 2]] # 5-P4/16
  - [-1, 2, C3k2, [512, True]] # 6 第三个C2F
  - [-1, 1, Conv, [1024, 3, 2]] # 7-P5/32
  - [-1, 2, C3k2, [1024, True]] # 8 第四个C2F
  - [-1, 1, SPPF, [1024, 5]] # 9
  - [-1, 2, C2PSA, [1024]] # 10

head:
  #NECK
  # Semantic Collecting
  - [0, 1, nn.AvgPool2d, [8, 8, 0]] # 11 #第一个卷积输出
  - [2, 1, nn.AvgPool2d, [4, 4, 0]] # 12 #第一个C2F输出
  - [4, 1, nn.AvgPool2d, [2, 2, 0]] # 13 #第2个c2f输出
  - [10, 1, nn.Upsample, [None, 2, 'nearest']] # 14 #SPPF输出
  
  - [[11, 12, 13, 6, 14], 1, Concat, [1]]  #15 融合 加上第三个c2f输出和上采样后的SPPF输出
  #图卷积信息聚合
  - [-1, 1, Conv, [512, 1, 1]] # 16
  #- [-1, 1, VM, [512,512,0.25]] #17
  #- [-1, 1, Conv, [512, 3, 1]]
  - [-1, 1, GCN_Concat_add_atten, [512,512,0.25]] #17

  - [-1, 2, C3k2, [512]]  # 18 (P4/16-medium) 16*16
  
  - [-1, 1, DualAttentionFusion, [512,0.25,"double77"]]  # 19
  #- [-1, 1, IN, []] 
  

  #HEAD
  #head P4
  #连接backbone P4,直接连接  16*16
  #- [[-1,6],1,Cross_linear,[512,512,0.25]] #20  #连接第三个C2F
  #- [-1, 1, IN, []] #21
  - [[-1, 6], 1, Concat, []]  
  - [-1, 2, C3k2, [512]] 

  #P3/B3
  #主干网络上采样后，融合backboneP3
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] #22
  #- [[-1,4],1,Cross_linear,[512,512,0.25]] #23 连接第二个C2F  #不同版本的yolo第二个参数设置可能不同，具体参照第二个C2F的输出大小
  #- [-1, 1, IN, []] #24
  - [[-1, 4], 1, Concat, []]  
  - [-1, 2, C3k2, [256]] 
  
   #图特征上采样，融合到主干网络
  - [19, 1, nn.Upsample, [None, 2, 'nearest']] #25 连接融合特征
  #图特征图像特征融合
  #- [[-2,-1],1,Cross_linear,[512,512,0.25]] #26  #不同版本的yolo第二个参数设置可能不同，具体参照第二个C2F的输出大小
  #- [-1, 1, IN, []] #27
  - [[-2, -1], 1, Concat, []]  
  - [-1, 2, C3k2, [256]] 

  
  #B4
  #下采样,连接head P4 16*16
  - [-1, 1, Conv, [256, 3, 2]] # 28
  #- [[-1,21],1,Cross_linear,[256,512,0.25]] #29
  #- [-1, 1, IN, []] #30
  - [[-1, 21], 1, Concat, []]  
  - [-1, 2, C3k2, [512]] 
  #融合图特征
    #图特征图像特征融合
  #- [[-1,19],1,Cross_linear,[512,512,0.25]] #31
  #- [-1, 1, IN, []]  #32
  - [[-1, 19], 1, Concat, []]  
  - [-1, 2, C3k2, [512]] 

  #B5
  #下采样，连接backbone P5
  - [-1, 1, Conv, [512, 3, 2]] # 33
  #- [[-1,10],1,Cross_linear,[512,1024,0.25]] #34
  #- [-1, 1, IN, []] #35
  - [[-1, 10], 1, Concat, []]  
  - [-1, 2, C3k2, [1024]] 

  #图特征下采样，融合到主干网络
  - [19, 1, nn.AvgPool2d, [2, 2, 0]] # 36
   #图特征图像特征融合
  #- [[-2,-1],1,Cross_linear,[1024,512,0.25]] #37
  #- [-1, 1, IN, []] #38
  - [[-2, -1], 1, Concat, []]  
  - [-1, 2, C3k2, [1024]] 
  - [[27, 32, -1], 1, OBB, [nc, 1]] # Detect(P3, P4, P5)
  #- [[27, 32, -1], 1, Detect, [nc]]  #39 Detect(P3, P4, P5)
